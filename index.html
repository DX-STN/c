<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crop Test (Image Space)</title>

<style>
body { margin:0; background:#111; display:flex; flex-direction:column; align-items:center; }
.canvas { width:90vw; margin:10px 0; background:#222; position:relative; overflow:hidden; touch-action:none; }

#nav-container { height:30vh; }
#main-container { height:50vh; background:#333; }

#main-img,#nav-img {
    position:absolute;
    top:0; left:0;
    transform-origin:0 0;
    pointer-events:none;
    display:none;
}

.crop-box {
    position:absolute;
    border:2px solid #4da3ff;
    box-sizing:border-box;
    pointer-events:none;
    display:none;
}

.nav-box {
    position:absolute;
    border:1px solid red;
    background:rgba(255,0,0,0.2);
    pointer-events:none;
    display:none;
}

.handle {
    position:absolute;
    background:rgba(0,100,255,0.25);
    pointer-events:auto;
}

.h-n,.h-s { height:40px; transform:translateY(-20px); }
.h-e,.h-w { width:40px; transform:translateX(-20px); }
</style>
</head>

<body>

<div id="nav-container" class="canvas">
    <img id="nav-img">
    <div id="nav-box" class="nav-box"></div>
</div>

<div id="main-container" class="canvas">
    <img id="main-img">
    <div id="crop-box" class="crop-box"></div>

    <div id="hn" class="handle h-n" data-edge="n"></div>
    <div id="hs" class="handle h-s" data-edge="s"></div>
    <div id="he" class="handle h-e" data-edge="e"></div>
    <div id="hw" class="handle h-w" data-edge="w"></div>
</div>

<input type="file" id="file-input" accept="image/*">

<script>
const navImg = document.getElementById('nav-img');
const mainImg = document.getElementById('main-img');
const navBox = document.getElementById('nav-box');
const cropBox = document.getElementById('crop-box');
const mCont = document.getElementById('main-container');
const nCont = document.getElementById('nav-container');

const handles = {
    n: hn, s: hs, e: he, w: hw
};

let img = { w:0, h:0, isLoaded:false };
let view = { x:0, y:0, scale:1 };

// ★ 画像座標で管理
let crop = { x:0, y:0, w:0, h:0 };

let touch = { mode:'', lastX:0, lastY:0, edge:'' };

document.getElementById('file-input').onchange = e=>{
    const file = e.target.files[0];
    if(!file) return;

    const r = new FileReader();
    r.onload = ev=>{
        navImg.src = mainImg.src = ev.target.result;

        mainImg.onload = ()=>{
            img.w = mainImg.naturalWidth;
            img.h = mainImg.naturalHeight;
            img.isLoaded = true;

            const rect = mCont.getBoundingClientRect();

            view.scale = Math.min(rect.width/img.w, rect.height/img.h);
            view.x = (rect.width - img.w*view.scale)/2;
            view.y = (rect.height - img.h*view.scale)/2;

            // ★ 画像フル選択
            crop = { x:0, y:0, w:img.w, h:img.h };

            mainImg.style.display =
            navImg.style.display =
            cropBox.style.display =
            navBox.style.display = 'block';

            update();
        };
    };
    r.readAsDataURL(file);
};

mCont.addEventListener('touchstart', e=>{
    if(!img.isLoaded) return;

    if(e.target.classList.contains('handle')){
        touch.mode='edit';
        touch.edge=e.target.dataset.edge;
    }else{
        touch.mode='scroll';
    }

    touch.lastX = e.touches[0].pageX;
    touch.lastY = e.touches[0].pageY;
});

mCont.addEventListener('touchmove', e=>{
    if(!touch.mode) return;
    e.preventDefault();

    const dx = e.touches[0].pageX - touch.lastX;
    const dy = e.touches[0].pageY - touch.lastY;

    if(touch.mode==='scroll'){
        view.x += dx;
        view.y += dy;
    }else{
        // ★ 画像座標に変換
        const dxi = dx / view.scale;
        const dyi = dy / view.scale;

        const minScreen = 20;
        const minW = minScreen / view.scale;
        const minH = minScreen / view.scale;

        if(touch.edge==='n'){
            crop.y += dyi;
            crop.h -= dyi;
        }
        if(touch.edge==='s'){
            crop.h += dyi;
        }
        if(touch.edge==='e'){
            crop.w += dxi;
        }
        if(touch.edge==='w'){
            crop.x += dxi;
            crop.w -= dxi;
        }

        // ★ 画像境界制限
        if(crop.x < 0){ crop.w += crop.x; crop.x = 0; }
        if(crop.y < 0){ crop.h += crop.y; crop.y = 0; }

        if(crop.x + crop.w > img.w){
            crop.w = img.w - crop.x;
        }
        if(crop.y + crop.h > img.h){
            crop.h = img.h - crop.y;
        }

        // ★ 最小サイズ
        crop.w = Math.max(minW, crop.w);
        crop.h = Math.max(minH, crop.h);
    }

    touch.lastX = e.touches[0].pageX;
    touch.lastY = e.touches[0].pageY;

    update();
});

function update(){
    if(!img.isLoaded) return;

    mainImg.style.transform =
        `translate(${view.x}px,${view.y}px) scale(${view.scale})`;

    // ★ 画像→画面変換
    const x = view.x + crop.x * view.scale;
    const y = view.y + crop.y * view.scale;
    const w = crop.w * view.scale;
    const h = crop.h * view.scale;

    cropBox.style.left = x+'px';
    cropBox.style.top = y+'px';
    cropBox.style.width = w+'px';
    cropBox.style.height = h+'px';

    const offset = 5;

    handles.n.style.left = (x+offset)+'px';
    handles.n.style.width = (w-offset*2)+'px';
    handles.n.style.top = y+'px';

    handles.s.style.left = (x+offset)+'px';
    handles.s.style.width = (w-offset*2)+'px';
    handles.s.style.top = (y+h)+'px';

    handles.w.style.top = (y+offset)+'px';
    handles.w.style.height = (h-offset*2)+'px';
    handles.w.style.left = x+'px';

    handles.e.style.top = (y+offset)+'px';
    handles.e.style.height = (h-offset*2)+'px';
    handles.e.style.left = (x+w)+'px';

    // ★ ナビ
    const nRect = nCont.getBoundingClientRect();
    const nScale = Math.min(nRect.width/img.w, nRect.height/img.h);
    const nX = (nRect.width - img.w*nScale)/2;
    const nY = (nRect.height - img.h*nScale)/2;

    navImg.style.transform =
        `translate(${nX}px,${nY}px) scale(${nScale})`;

    navBox.style.left = (nX + crop.x * nScale)+'px';
    navBox.style.top  = (nY + crop.y * nScale)+'px';
    navBox.style.width = (crop.w * nScale)+'px';
    navBox.style.height= (crop.h * nScale)+'px';
}
</script>

</body>
</html>
